services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: alphamedi_ips
      POSTGRES_USER: alphamedi
      POSTGRES_PASSWORD: alphamedi_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alphamedi -d alphamedi_ips"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    environment: &backend-environment
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      LOG_LEVEL: info
      DATABASE_URL: postgresql://alphamedi:alphamedi_dev@postgres:5432/alphamedi_ips?schema=public
      REDIS_URL: redis://redis:6379
      CORS_ORIGINS: http://localhost:5173
      RATE_LIMIT_MAX: 100
      RATE_LIMIT_WINDOW: 1 minute
      METRICS_ENABLED: "true"
      AI_PROVIDER: mock
    command: ["npm", "run", "prisma:migrate:deploy"]
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment: *backend-environment
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    environment: *backend-environment
    command: ["npm", "run", "start:worker"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  postgres_data:
  redis_data:
